<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Stats</title>
    <link rel="stylesheet" href="../style.css"> <!-- Haupt-Stylesheet -->
    <link rel="stylesheet" href="spotify-stats.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Verwende die gleiche 'main-card'-Struktur wie auf der Startseite -->
    <div class="main-card">
        <h1>Spotify Stats</h1>
        
        <div id="spotify-container">
            <p>Lade Spotify-Daten...</p>
        </div>

        <div id="charts-container">
            <h2>Top Künstler</h2>
            <!-- Container für die Chart, um die Höhe zu kontrollieren -->
            <div class="chart-wrapper">
                <canvas id="top-artists-chart"></canvas>
            </div>
        </div>

        <a href="/" class="stats-link">→ Zurück zur Startseite</a>

    </div>

    <footer>
        <p style="text-align:center;color:var(--accent2,#7dd3fc);margin-top:40px;font-size:1em;">2025 Unfancy - Laurin</p>
    </footer>

    <script src="spotify-stats.js"></script>
</body>
</html>
