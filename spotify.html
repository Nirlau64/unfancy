<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unfancy - Spotify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="icon" type="image/png" href="assets/favicon.png">
</head>
<body>
    <div class="main-card">
        <header>
            <h1><span class="text-accent">Unfancy</span> Dashboard</h1>
            <p class="text-muted">Willkommen im zentralen Hub</p>
        </header>

        <nav class="nav-tabs" id="nav-tabs">
            <a href="index.html" class="nav-link" data-page="home">Home</a>
            <a href="steam.html" class="nav-link" data-page="steam">Steam</a>
            <a href="spotify.html" class="nav-link active" data-page="spotify">Spotify</a>
            <a href="lol.html" class="nav-link" data-page="lol">League of Legends</a>
            <a href="socials.html" class="nav-link" data-page="socials">Socials</a>
        </nav>

        <main id="app-content">
            <div id="spotify" class="tab-content active">
                <div class="time-range-buttons">
                    <button data-range="short_term">4 Wochen</button>
                    <button data-range="medium_term" class="active">6 Monate</button>
                    <button data-range="long_term">Insgesamt</button>
                </div>
                
                <div class="section" id="spotify-now-playing"></div>
                
                <div class="section" id="spotify-artists">
                    <h2>Meine Top Künstler</h2>
                    <div class="text-center text-muted" aria-live="polite">Lade Daten...</div>
                </div>
                
                <div class="section" id="spotify-tracks">
                    <h2>Meine Top Titel</h2>
                    <div class="text-center text-muted" aria-live="polite">Lade Daten...</div>
                </div>
            </div>
        </main>
    </div>
    <footer><p>2026 Unfancy - Laurin</p></footer>
    <script type="module" src="js/main.js"></script>
</body>
</html>
