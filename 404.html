<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3b82f6">
    <title>Unfancy - Seite nicht gefunden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <style>
        :root {
            --bg: #181a20;
            --bg-card: #23262f;
            --text: #f1f1f1;
            --text-muted: #aaa;
            --accent: #3b82f6;
            --shadow: 0 4px 24px 0 #000a;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', Arial, sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh;
        }
        .card {
            background: var(--bg-card);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
            width: calc(100% - 40px);
        }
        h1 { font-size: 4em; margin: 0 0 10px 0; color: var(--accent); }
        h2 { font-size: 1.4em; margin: 0 0 15px 0; font-weight: 600; }
        p { color: var(--text-muted); font-size: 1em; line-height: 1.6; margin: 0 0 25px 0; }
        .btn-home {
            display: inline-block;
            background: var(--accent); color: #fff;
            padding: 12px 28px; border-radius: 20px;
            text-decoration: none; font-weight: 700;
            transition: opacity 0.2s;
        }
        .btn-home:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="card">
        <h1>404</h1>
        <h2>Seite nicht gefunden</h2>
        <p>Die angeforderte Seite existiert leider nicht. Vielleicht hat sich ein Tippfehler eingeschlichen?</p>
        <a href="/" class="btn-home">Zurück zum Dashboard</a>
    </div>
</body>
</html>
